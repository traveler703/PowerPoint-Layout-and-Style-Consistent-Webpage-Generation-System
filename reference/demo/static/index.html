<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>演示 · 网页生成</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <h1>PowerPoint 风格网页生成 · 演示</h1>
    <p class="muted">输入大纲（多页用 <code>---</code> 分隔），选择主题与输出格式后生成；可选 LangChain 调用链。</p>
  </header>
  <main class="grid">
    <section class="panel">
      <label for="notes">内容输入</label>
      <textarea id="notes" rows="14" placeholder="# 季度汇报&#10;&#10;- 要点一：说明文字&#10;- 要点二：说明&#10;&#10;---&#10;&#10;## 下一页&#10;![图](https://picsum.photos/seed/slide/640/360)"></textarea>
      <div class="row">
        <div class="field">
          <label for="theme">主题</label>
          <select id="theme"></select>
        </div>
        <div class="field">
          <label for="format">输出</label>
          <select id="format">
            <option value="html" selected>HTML</option>
            <option value="markdown">Markdown</option>
          </select>
        </div>
        <label class="check">
          <input type="checkbox" id="useLc" />
          LangChain 调用
        </label>
      </div>
      <div class="actions">
        <button type="button" id="btn-generate">生成</button>
        <button type="button" id="btn-export" class="secondary" disabled>导出文件</button>
        <button type="button" id="btn-copy" class="secondary" disabled>复制内容</button>
        <span id="status" class="muted"></span>
      </div>
      <pre id="report" class="report" hidden></pre>
    </section>
    <section class="panel preview-wrap">
      <h2>预览</h2>
      <iframe id="preview" title="preview" sandbox="allow-same-origin"></iframe>
      <pre id="md-preview" class="md-preview" hidden></pre>
    </section>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
