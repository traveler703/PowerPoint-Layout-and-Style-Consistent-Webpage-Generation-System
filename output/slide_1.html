<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件需求规约 · 封面</title>
    <style>

/* 
 * 防内容溢出CSS - 防止LLM生成的overflow:hidden截断文字
 * 目标：只解锁"叶子级内容容器"的文字截断
 */

p, span, li, td, th, label,
h1, h2, h3, h4, h5, h6, a {
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

[class*="card"] > *,
[class*="item"] > p, [class*="item"] > span,
[class*="tile"] > *, [class*="panel"] > *,
[class*="desc"], [class*="info"] > p {
    overflow: visible !important;
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

.content-layer,
[data-content-layer],
.main-content,
[class*="slide-root"],
#canvas,
body > div {
    /* 保持原有overflow行为 */
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6e9ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
        }

        /* 固定画布 1280x720 */
        .slide {
            width: 1280px;
            height: 720px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ========= 三段式结构 ========= */
        .header {
            height: 80px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 0 56px;
            border-bottom: 1px solid #eef0f4;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-badge {
            width: 32px;
            height: 32px;
            background: #1a2b4c;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .org-name {
            font-size: 14px;
            font-weight: 500;
            color: #4a5a72;
            letter-spacing: 0.3px;
        }

        .header-right {
            margin-left: auto;
            font-size: 13px;
            color: #8a9bb0;
            font-weight: 400;
            background: #f3f5f9;
            padding: 4px 14px;
            border-radius: 30px;
        }

        /* 主内容区 580px */
        .main {
            flex: 1;
            min-height: 580px;
            max-height: 580px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            position: relative;
            background: #ffffff;
            overflow: hidden;
        }

        /* 抽象几何背景装饰 —— 点线构成的网页骨架轮廓 */
        .bg-decoration {
            position: absolute;
            right: -20px;
            top: 20px;
            width: 460px;
            height: 460px;
            pointer-events: none;
            opacity: 0.30;
        }

        .bg-decoration svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #1a2b4c;
            stroke-width: 1.6;
        }

        .main-content {
            position: relative;
            z-index: 2;
            max-width: 820px;
        }

        .pretitle {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #6c7e9a;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-left: 4px solid #1a2b4c;
            padding-left: 16px;
        }

        .main-title {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.25;
            color: #0a1a2f;
            letter-spacing: 1px;
            margin-bottom: 24px;
            max-width: 760px;
        }

        .main-title .highlight {
            color: #1a2b4c;
            background: linear-gradient(120deg, #f0f4ff 0%, #f0f4ff 40%, transparent 80%);
            padding: 0 8px 0 0;
        }

        .sub-info {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            margin-top: 16px;
            font-size: 16px;
            color: #2f405c;
            font-weight: 400;
            border-top: 1px solid #e6eaf0;
            padding-top: 28px;
            max-width: 600px;
        }

        .sub-info span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-info .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #1a2b4c;
            border-radius: 50%;
            margin-right: 4px;
        }

        .meta-tag {
            background: #ecf1f8;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #1f334f;
            font-weight: 500;
        }

        /* 页脚 60px */
        .footer {
            height: 60px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 56px;
            border-top: 1px solid #eef0f4;
            background: #fafcff;
        }

        .footer-left {
            font-size: 13px;
            color: #6f82a0;
        }

        .footer-right {
            font-size: 14px;
            font-weight: 500;
            color: #1a2b4c;
            letter-spacing: 0.5px;
        }

        .page-number {
            background: #eef2f8;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #1f334f;
        }

        /* 保证无滚动条 */
        .slide, .header, .main, .footer {
            overflow: hidden;
        }

        /* 响应式微调（画布固定1280，无需额外响应） */
        @media (max-width: 1300px) {
            .slide {
                transform: scale(0.8);
                transform-origin: center center;
            }
        }
        @media (max-width: 1050px) {
            .slide {
                transform: scale(0.65);
                transform-origin: center center;
            }
        }
    </style>
</head>
<body>
<div class="slide">
    <!-- Header 80px -->
    <div class="header">
        <div class="header-left">
            <div class="logo-badge">RS</div>
            <span class="org-name">需求工程 · 规范设计</span>
        </div>
        <div class="header-right">
            ⚡ 学术报告 · 项目答辩
        </div>
    </div>

    <!-- Main 580px -->
    <div class="main">
        <!-- 抽象装饰：点线网页骨架轮廓 -->
        <div class="bg-decoration">
            <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <!-- 抽象网页骨架线框 -->
                <rect x="40" y="40" width="320" height="60" rx="6" stroke="#1a2b4c" stroke-width="1.4" fill="rgba(26,43,76,0.02)"/>
                <rect x="40" y="120" width="140" height="90" rx="6" stroke="#1a2b4c" stroke-width="1.2" fill="rgba(26,43,76,0.03)"/>
                <rect x="200" y="120" width="160" height="90" rx="6" stroke="#1a2b4c" stroke-width="1.2" fill="rgba(26,43,76,0.03)"/>
                <rect x="40" y="230" width="320" height="50" rx="6" stroke="#1a2b4c" stroke-width="1.2" fill="rgba(26,43,76,0.02)"/>
                <circle cx="100" cy="300" r="18" stroke="#1a2b4c" stroke-width="1.4" fill="rgba(26,43,76,0.04)"/>
                <circle cx="200" cy="300" r="18" stroke="#1a2b4c" stroke-width="1.4" fill="rgba(26,43,76,0.04)"/>
                <circle cx="300" cy="300" r="18" stroke="#1a2b4c" stroke-width="1.4" fill="rgba(26,43,76,0.04)"/>
                <line x1="120" y1="300" x2="180" y2="300" stroke="#1a2b4c" stroke-width="1.2" stroke-dasharray="4 4"/>
                <line x1="220" y1="300" x2="280" y2="300" stroke="#1a2b4c" stroke-width="1.2" stroke-dasharray="4 4"/>
                <path d="M60 370 L120 350 L180 370 L240 350 L300 370" stroke="#1a2b4c" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
                <circle cx="60" cy="370" r="4" fill="#1a2b4c" opacity="0.4"/>
                <circle cx="180" cy="370" r="4" fill="#1a2b4c" opacity="0.4"/>
                <circle cx="300" cy="370" r="4" fill="#1a2b4c" opacity="0.4"/>
            </svg>
        </div>

        <div class="main-content">
            <div class="pretitle">软件需求规约 · SRS v2.0</div>
            <div class="main-title">
                PowerPoint布局与风格<br/>
                <span class="highlight">一致网页生成系统</span>
            </div>
            <div class="sub-info">
                <span><span class="dot"></span> 需求分析 · 架构设计</span>
                <span><span class="dot"></span> 模版驱动 · 自动渲染</span>
                <span class="meta-tag">📄 14页规范文档</span>
            </div>
            <div style="margin-top: 24px; display: flex; gap: 20px; font-size: 14px; color: #4b5f7b;">
                <span>👤 汇报人：系统架构组</span>
                <span>📅 2025.04</span>
                <span>🏫 软件工程研究所</span>
            </div>
        </div>
    </div>

    <!-- Footer 60px -->
    <div class="footer">
        <div class="footer-left">
            <span>⚙️ 一致性 · 模块化 · 可扩展</span>
        </div>
        <div class="footer-right">
            <span class="page-number">1 / 14</span>
        </div>
    </div>
</div>
</body>
</html>
