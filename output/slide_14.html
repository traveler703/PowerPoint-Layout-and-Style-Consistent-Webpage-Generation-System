<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感谢 · SEEM系统需求规约</title>
    <style>

/* 
 * 防内容溢出CSS - 防止LLM生成的overflow:hidden截断文字
 * 目标：只解锁"叶子级内容容器"的文字截断
 */

p, span, li, td, th, label,
h1, h2, h3, h4, h5, h6, a {
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

[class*="card"] > *,
[class*="item"] > p, [class*="item"] > span,
[class*="tile"] > *, [class*="panel"] > *,
[class*="desc"], [class*="info"] > p {
    overflow: visible !important;
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

.content-layer,
[data-content-layer],
.main-content,
[class*="slide-root"],
#canvas,
body > div {
    /* 保持原有overflow行为 */
}

        /* === 全局重置 & 基础 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6e9ef; /* 柔和背景，突出画布 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
        }

        /* === 固定画布：1280x720 === */
        .slide {
            width: 1280px;
            height: 720px;
            background: #ffffff;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            border-radius: 8px;
            overflow: hidden; /* 确保无滚动条，无内容溢出 */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* === 三段式结构 === */
        /* Header: 80px (含顶部装饰线 + 项目标识) */
        .slide-header {
            height: 80px;
            min-height: 80px;
            width: 100%;
            padding: 0 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eef0f4;
            background: #ffffff;
            position: relative;
        }

        /* 页眉装饰线 (主色) — 遵循宪法 5.1 */
        .slide-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 60px;
            width: calc(100% - 120px);
            height: 3px;
            background: #1a3e6f; /* 主色 – 深蓝，体现专业严谨 */
            border-radius: 2px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #1a3e6f;
            letter-spacing: 0.3px;
        }

        .header-left svg {
            width: 28px;
            height: 28px;
            fill: #1a3e6f;
        }

        .header-left span {
            font-weight: 600;
            font-size: 15px;
            color: #0a1c2f;
        }

        .header-right {
            font-size: 12px;
            color: #6b7a8f;
            background: #f2f5f9;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        /* Main: 580px (内容核心) */
        .slide-main {
            height: 580px;
            min-height: 580px;
            width: 100%;
            padding: 40px 80px 30px 80px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
            position: relative;
        }

        /* Footer: 60px (页码 + 页脚信息) */
        .slide-footer {
            height: 60px;
            min-height: 60px;
            width: 100%;
            padding: 0 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #f0f2f6;
            background: #ffffff;
            font-size: 13px;
            color: #6b7a8f;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 400;
        }

        .footer-left .separator {
            width: 1px;
            height: 18px;
            background: #d0d6e0;
        }

        .footer-right {
            font-weight: 500;
            color: #1a3e6f;
            background: #f5f8fc;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
        }

        /* === 当前页内容：感谢 === */
        .thanks-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            position: relative;
        }

        /* 装饰性背景图形 —— 抽象几何，增加层次 (遵循宪法 3.4) */
        .thanks-container::before {
            content: '';
            position: absolute;
            top: 20px;
            right: 40px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 30% 40%, rgba(26, 62, 111, 0.03) 0%, rgba(26, 62, 111, 0.08) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .thanks-container::after {
            content: '';
            position: absolute;
            bottom: 40px;
            left: 60px;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(26, 62, 111, 0.10);
            border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%;
            z-index: 0;
            pointer-events: none;
            transform: rotate(-12deg);
        }

        .thanks-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        /* 主视觉符号 — 简约线条 / 抽象“无限”或“对勾” */
        .thanks-icon {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .thanks-icon svg {
            width: 72px;
            height: 72px;
            fill: none;
            stroke: #1a3e6f;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.9;
        }

        .thanks-title {
            font-size: 52px;
            font-weight: 700;
            color: #0a1c2f;
            letter-spacing: 4px;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .thanks-title small {
            font-size: 28px;
            font-weight: 300;
            color: #4c5e72;
            letter-spacing: 2px;
            display: block;
            margin-top: 6px;
        }

        .thanks-divider {
            width: 80px;
            height: 3px;
            background: #1a3e6f;
            border-radius: 4px;
            margin: 20px auto 28px auto;
        }

        .thanks-message {
            font-size: 22px;
            font-weight: 400;
            color: #2c3e50;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }

        .thanks-message span {
            display: inline-block;
            background: #f2f6fc;
            padding: 0 12px;
            border-radius: 30px;
            font-weight: 500;
            color: #1a3e6f;
        }

        .thanks-footer-note {
            margin-top: 36px;
            font-size: 16px;
            color: #5b6f84;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            letter-spacing: 0.5px;
        }

        .thanks-footer-note .tag {
            background: #f5f8fc;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 15px;
            color: #1a3e6f;
            border: 1px solid #e6ecf3;
        }

        .thanks-footer-note .tag i {
            font-style: normal;
            margin-right: 6px;
        }

        /* 辅助排版 */
        .text-muted {
            color: #7b8a9e;
        }

        /* 确保无溢出 */
        .slide, .slide-header, .slide-main, .slide-footer {
            max-width: 1280px;
        }

        /* 响应式微调 (但保持固定尺寸不滚动) */
        @media (max-width: 1300px) {
            .slide {
                transform: scale(0.9);
                transform-origin: center center;
            }
        }

        @media (max-width: 1000px) {
            .slide {
                transform: scale(0.75);
                transform-origin: center center;
            }
        }

        /* 自检：无滚动条，无截断 */
        body {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- Header: 80px -->
        <header class="slide-header">
            <div class="header-left">
                <!-- 简洁抽象图标：莫比乌斯带 / 系统连接 -->
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="#1a3e6f" fill="none"/>
                    <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z" stroke="#1a3e6f" fill="none" opacity="0.6"/>
                    <path d="M9 12l2 2 4-4" stroke="#1a3e6f" stroke-width="2" fill="none"/>
                </svg>
                <span>SEEM · 规约</span>
            </div>
            <div class="header-right">
                需求规约 · 终稿
            </div>
        </header>

        <!-- Main: 580px 感谢核心 -->
        <main class="slide-main">
            <div class="thanks-container">
                <div class="thanks-content">
                    <!-- 图标：握手/合作/对勾，抽象线条 -->
                    <div class="thanks-icon">
                        <svg viewBox="0 0 64 64" width="72" height="72">
                            <circle cx="32" cy="32" r="28" stroke="#1a3e6f" stroke-width="1.6" fill="none" opacity="0.3"/>
                            <path d="M22 34 l6 6 l14 -14" stroke="#1a3e6f" stroke-width="3" fill="none"/>
                            <path d="M20 38 l-4 4 l10 0" stroke="#1a3e6f" stroke-width="2" fill="none" opacity="0.7"/>
                            <circle cx="44" cy="24" r="3" fill="#1a3e6f" opacity="0.5"/>
                        </svg>
                    </div>

                    <h1 class="thanks-title">
                        感谢关注
                        <small>SEEM 系统需求规约</small>
                    </h1>

                    <div class="thanks-divider"></div>

                    <p class="thanks-message">
                        期待您的反馈与合作<br>
                        <span>Let's build something great together.</span>
                    </p>

                    <div class="thanks-footer-note">
                        <span class="tag"><i>✉</i> feedback@seem-spec.dev</span>
                        <span class="tag"><i>🔗</i> 项目迭代 · 持续交付</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer: 60px -->
        <footer class="slide-footer">
            <div class="footer-left">
                <span>SEEM 需求规约</span>
                <span class="separator"></span>
                <span class="text-muted">系统设计与验证</span>
            </div>
            <div class="footer-right">
                14 / 14
            </div>
        </footer>
    </div>

    <!-- 自检注释：无滚动条，无截断，画布1280x720，三段式严格 -->
</body>
</html>
