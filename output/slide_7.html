<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能需求：版式选型与风格管理</title>
    <style>

/* 
 * 防内容溢出CSS - 防止LLM生成的overflow:hidden截断文字
 * 目标：只解锁"叶子级内容容器"的文字截断
 */

p, span, li, td, th, label,
h1, h2, h3, h4, h5, h6, a {
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

[class*="card"] > *,
[class*="item"] > p, [class*="item"] > span,
[class*="tile"] > *, [class*="panel"] > *,
[class*="desc"], [class*="info"] > p {
    overflow: visible !important;
    text-overflow: unset !important;
    -webkit-line-clamp: unset !important;
}

.content-layer,
[data-content-layer],
.main-content,
[class*="slide-root"],
#canvas,
body > div {
    /* 保持原有overflow行为 */
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .slide {
            width: 1280px;
            height: 720px;
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 三段式：Header + Main + Footer */
        .header {
            height: 80px;
            padding: 0 48px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e9edf4;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: #1a3c6e;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a3c6e;
            letter-spacing: 0.5px;
        }

        .header-center {
            flex: 1;
            text-align: center;
            font-size: 13px;
            color: #7f8c9b;
            letter-spacing: 1px;
        }

        .header-right {
            font-size: 13px;
            color: #7f8c9b;
            font-weight: 400;
        }

        .main {
            flex: 1;
            padding: 32px 48px 20px 48px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #0b1c2e;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            line-height: 1.3;
            position: relative;
            padding-bottom: 10px;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 52px;
            height: 4px;
            background: #1a3c6e;
            border-radius: 2px;
        }

        .subtitle-abstract {
            font-size: 15px;
            color: #4a5a6e;
            margin-top: 10px;
            margin-bottom: 24px;
            line-height: 1.5;
            max-width: 85%;
            font-weight: 400;
        }

        .content-grid {
            flex: 1;
            display: flex;
            gap: 32px;
            align-items: stretch;
        }

        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .feature-card {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 22px 26px;
            border-left: 5px solid #1a3c6e;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .feature-card:nth-child(2) {
            border-left-color: #3b6ea5;
        }

        .feature-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #eef3fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1a3c6e;
            flex-shrink: 0;
        }

        .feature-title {
            font-size: 20px;
            font-weight: 600;
            color: #0b1c2e;
            letter-spacing: 0.3px;
        }

        .feature-desc {
            font-size: 15px;
            color: #2f4052;
            line-height: 1.6;
            padding-left: 54px;
        }

        .feature-desc strong {
            font-weight: 600;
            color: #1a3c6e;
        }

        .right-panel {
            flex: 0.9;
            background: #f2f6fc;
            border-radius: 16px;
            padding: 28px 24px 24px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 60, 110, 0.06);
            border: 1px solid #e3eaf2;
        }

        .token-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .token-icon {
            font-size: 24px;
            color: #1a3c6e;
        }

        .token-title {
            font-size: 18px;
            font-weight: 600;
            color: #0b1c2e;
        }

        .token-metrics {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .metric-item {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .metric-label {
            font-size: 14px;
            color: #4a5a6e;
            width: 80px;
            flex-shrink: 0;
            font-weight: 500;
        }

        .metric-bar {
            flex: 1;
            height: 10px;
            background: #dce3ec;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .metric-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #1a3c6e, #3b6ea5);
            width: 0%;
        }

        .metric-fill.blue {
            width: 92%;
        }

        .metric-fill.teal {
            width: 88%;
        }

        .metric-fill.green {
            width: 96%;
        }

        .metric-value {
            font-size: 14px;
            font-weight: 600;
            color: #1a3c6e;
            width: 44px;
            text-align: right;
        }

        .token-note {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed #cdd8e6;
            font-size: 14px;
            color: #3d4f64;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .token-note span {
            background: #1a3c6e10;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            color: #1a3c6e;
        }

        .footer {
            height: 60px;
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #e9edf4;
            flex-shrink: 0;
            background: #ffffff;
        }

        .footer-left {
            font-size: 12px;
            color: #8a9aa8;
        }

        .footer-center {
            font-size: 12px;
            color: #8a9aa8;
            letter-spacing: 0.5px;
        }

        .footer-right {
            font-size: 14px;
            font-weight: 500;
            color: #1a3c6e;
        }

        /* 辅助装饰 - 背景几何 */
        .bg-geo {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(26,60,110,0.03), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-geo-2 {
            position: absolute;
            right: 80px;
            top: 60px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 30%, rgba(59,110,165,0.04), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 1280px) {
            .slide {
                width: 100%;
                height: 720px;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- 背景装饰 -->
        <div class="bg-geo"></div>
        <div class="bg-geo-2"></div>

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="brand-icon">📐</div>
                <span class="brand-name">布局引擎 · 风格系统</span>
            </div>
            <div class="header-center">软件需求规约 | 学术报告</div>
            <div class="header-right">v2.4</div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="page-title">功能需求：版式选型与风格管理</div>
            <div class="subtitle-abstract">智能匹配与一致性保障，驱动多文档视觉统一</div>

            <div class="content-grid">
                <!-- 左栏：两个要点卡片 -->
                <div class="left-panel">
                    <div class="feature-card">
                        <div class="feature-header">
                            <div class="feature-icon">🧩</div>
                            <span class="feature-title">版式自动选型</span>
                        </div>
                        <div class="feature-desc">
                            <strong>基于要点数量、文本长度、图片与图表</strong> 自动匹配最优版式，实时检测元素重叠风险，确保布局稳健。
                        </div>
                    </div>
                    <div class="feature-card">
                        <div class="feature-header">
                            <div class="feature-icon">🎨</div>
                            <span class="feature-title">风格令牌管理</span>
                        </div>
                        <div class="feature-desc">
                            提供预设风格模板，支持<strong>自定义令牌</strong>与级联更新，全局颜色偏差 ≤ 5%，保持品牌一致。
                        </div>
                    </div>
                </div>

                <!-- 右栏：风格令牌指标 -->
                <div class="right-panel">
                    <div class="token-header">
                        <span class="token-icon">⚙️</span>
                        <span class="token-title">令牌一致性仪表盘</span>
                    </div>
                    <div class="token-metrics">
                        <div class="metric-item">
                            <span class="metric-label">主色偏差</span>
                            <div class="metric-bar">
                                <div class="metric-fill blue" style="width: 92%;"></div>
                            </div>
                            <span class="metric-value">≤2.1%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">辅色偏差</span>
                            <div class="metric-bar">
                                <div class="metric-fill teal" style="width: 88%;"></div>
                            </div>
                            <span class="metric-value">≤3.4%</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">强调色偏差</span>
                            <div class="metric-bar">
                                <div class="metric-fill green" style="width: 96%;"></div>
                            </div>
                            <span class="metric-value">≤1.8%</span>
                        </div>
                    </div>
                    <div class="token-note">
                        <span>级联更新</span> 所有页面自动同步，偏差阈值 < 5%
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-left">布局与风格 · 功能模块</div>
            <div class="footer-center">学术报告 · 软件需求规约</div>
            <div class="footer-right">7 / 14</div>
        </div>
    </div>
</body>
</html>
